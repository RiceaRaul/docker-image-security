apiVersion: v1
kind: Pod
metadata:
  labels:
    jenkins/agent: docker-sec
spec:
  serviceAccountName: jenkins-builder
  restartPolicy: Never
  containers:
    # ---- Jenkins JNLP agent (match controller Java version = 21) ----
    - name: jnlp
      image: jenkins/inbound-agent:latest-jdk21
      resources:
        requests: { cpu: 100m, memory: 256Mi }
        limits:   { cpu: 500m, memory: 512Mi }

    # ---- BuildKit (non-rootless, privileged) ----
    - name: buildkit
      image: moby/buildkit:v0.13.2
      args:
        - --addr
        - unix:///run/buildkit/buildkitd.sock
      tty: true
      securityContext:
        privileged: true
      readinessProbe:
        exec:
          command: ["buildctl", "debug", "workers"]
        initialDelaySeconds: 5
      volumeMounts:
        - { name: buildkitd, mountPath: /run/buildkit }

    # ---- Trivy ----
    - name: trivy
      image: aquasec/trivy:0.50.0
      command: ["cat"]
      tty: true
      env:
        - { name: TRIVY_CACHE_DIR, value: /tmp/.trivy }
      volumeMounts:
        - { name: trivy-cache, mountPath: /tmp/.trivy }

    # ---- Grype (alpine + install on start) ----
    - name: grype
      image: alpine:3.20
      env:
        # Allow stale DB (offline-friendly demo) — 1 year max age.
        - { name: GRYPE_DB_MAX_ALLOWED_BUILT_AGE, value: "8760h" }
        - { name: GRYPE_DB_VALIDATE_AGE,           value: "false" }
      command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache curl ca-certificates >/dev/null
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype version
          exec cat
      tty: true

    # ---- Syft (alpine + install on start) ----
    - name: syft
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache curl ca-certificates >/dev/null
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.5.0
          syft version
          exec cat
      tty: true

    # ---- Cosign (alpine + install on start) ----
    - name: cosign
      image: alpine:3.20
      command:
        - sh
        - -c
        - |
          set -e
          apk add --no-cache curl ca-certificates >/dev/null
          curl -sSfL -o /usr/local/bin/cosign \
            https://github.com/sigstore/cosign/releases/download/v2.2.4/cosign-linux-amd64
          chmod +x /usr/local/bin/cosign
          cosign version
          exec cat
      tty: true

    # ---- Conftest ----
    - name: conftest
      image: openpolicyagent/conftest:v0.55.0
      command: ["cat"]
      tty: true

    # ---- Hadolint ----
    - name: hadolint
      image: hadolint/hadolint:v2.12.0-alpine
      command: ["cat"]
      tty: true

  volumes:
    - { name: buildkitd,   emptyDir: {} }
    - { name: trivy-cache, emptyDir: {} }
